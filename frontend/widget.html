<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYU Chat Widget – Preview</title>
<script>
  window.KYU_CHAT_API = window.KYU_CHAT_API || (
    window.location.protocol.startsWith("http")
      ? window.location.origin
      : "http://localhost:8000"
  );
</script>
<link rel="stylesheet" href="/frontend/css/widget.css">
</head>
<body style="background:#f5f7fa;min-height:100vh;display:flex;align-items:center;justify-content:center;">
<p style="font-family:'Source Sans 3',sans-serif;color:#0a2d5c;opacity:0.4;font-size:14px;">Widget preview — click the chat button</p>

<div id="kyu-chat-root">

  <div id="kyu-chat-fab-wrap">
    <button id="kyu-chat-btn" aria-label="Open admissions chat">
      <svg class="icon-open" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h3l4 4 4-4h5c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
      </svg>
      <svg class="icon-close" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </button>
  </div>

  <div id="kyu-chat-window" role="dialog" aria-label="KYU Admissions Chat">

    <header id="kyu-header">
      <div id="kyu-header-info">
        <div id="kyu-header-title">Admissions Assistant</div>
        <div id="kyu-header-subtitle">Kyambogo University</div>
      </div>
      <div id="kyu-header-actions">
        <span id="kyu-status-badge">
          <span id="kyu-status-dot"></span>
          <span id="kyu-status-text">Online</span>
        </span>
        <button id="kyu-minimize-btn" aria-label="Close chat" title="Close">×</button>
      </div>
    </header>

    <div id="kyu-messages" role="log" aria-live="polite"></div>

    <div id="kyu-typing-wrap">
      <div id="kyu-typing" aria-live="polite">
        <div class="kyu-typing-bubble">
          <div class="kyu-dot"></div>
          <div class="kyu-dot"></div>
          <div class="kyu-dot"></div>
        </div>
      </div>
    </div>

    <div id="kyu-suggestions">
      <button class="kyu-suggestion" data-q="What programmes does KYU offer?">Programmes</button>
      <button class="kyu-suggestion" data-q="What are the admission requirements?">Requirements</button>
      <button class="kyu-suggestion" data-q="What are the tuition fees?">Tuition fees</button>
      <button class="kyu-suggestion" data-q="How do I apply to Kyambogo University?">How to apply</button>
    </div>

    <div id="kyu-input-area">
      <div id="kyu-input-shell">
        <textarea
          id="kyu-input"
          placeholder="Type your question…"
          rows="1"
          maxlength="500"
          aria-label="Type your question"
        ></textarea>
        <button id="kyu-send" aria-label="Send message" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div id="kyu-char-count">0 / 500</div>
    </div>

    <footer id="kyu-footer">
      Answers sourced from official KYU content
    </footer>

  </div>
</div><!-- /kyu-chat-root -->

<script src="/frontend/widget.js"></script>
</body>
</html>
