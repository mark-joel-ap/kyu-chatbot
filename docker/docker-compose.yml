# docker/docker-compose.yml
# ──────────────────────────
# Orchestrates the KYU Chatbot backend (FastAPI) and ChromaDB.
#
# Usage:
#   cd docker/
#   docker-compose up --build
#
# Or from project root:
#   docker-compose -f docker/docker-compose.yml up --build

version: "3.9"

services:

  # ── FastAPI + RAG Backend ─────────────────────────────────────────────────
  backend:
    build:
      context: ..           # project root (so COPY config.py etc. works)
      dockerfile: docker/Dockerfile
    container_name: kyu-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env             # GROQ_API_KEY etc.
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
    volumes:
      # Mount data and vector store so they persist between container restarts
      - ../data:/app/data
      - ../chroma_db:/app/chroma_db
      - ../logs:/app/logs
    depends_on:
      chromadb:
        condition: service_healthy
    networks:
      - kyu-net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── ChromaDB (standalone server mode – optional) ──────────────────────────
  # NOTE: By default we use ChromaDB's PersistentClient (file-based) inside
  # the backend container, so this service is optional.
  # Uncomment and switch to chromadb.HttpClient in retriever.py if you prefer
  # the networked server mode (better for multi-instance deployments).
  chromadb:
    image: chromadb/chroma:latest
    container_name: kyu-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"         # ChromaDB HTTP API (internal port 8000)
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - kyu-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Static file server for the mirrored site ─────────────────────────────
  mirror-site:
    image: nginx:alpine
    container_name: kyu-mirror
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../mirror:/usr/share/nginx/html:ro
      - ../frontend:/usr/share/nginx/html/frontend:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - kyu-net
    depends_on:
      - backend

volumes:
  chroma-data:
    driver: local

networks:
  kyu-net:
    driver: bridge
