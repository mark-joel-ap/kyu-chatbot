# docker/nginx.conf
# ──────────────────
# Nginx configuration for serving the mirrored KYU site.
# Also proxies /api/ requests to the FastAPI backend.

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static mirror files
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Serve widget files
    location /frontend/ {
        alias /usr/share/nginx/html/frontend/;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Proxy /api/ → FastAPI backend (avoids CORS issues)
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/html text/css application/json application/javascript;
    gzip_min_length 1000;

    error_page 404 /index.html;
}
